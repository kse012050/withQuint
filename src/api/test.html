<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center-to-Click Line Motion</title>
  <style>
    html, body { height:100%; margin:0; }
    canvas { display:block; width:100%; height:100%; background:#111; cursor:crosshair; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <script>
    (() => {
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let center = { x: 0, y: 0 };
      const finishedLines = [];   // 그려진 선들(유지)
      const anims = [];           // 진행중 애니메이션
      const DURATION = 500;       // 애니메이션 시간(ms)
      const LINE_WIDTH = 2;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width  = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        center = { x: w / 2, y: h / 2 };
      }
      window.addEventListener('resize', resize);
      resize();

      canvas.addEventListener('pointerdown', (e) => {
        const r = canvas.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;
        anims.push({ x, y, start: performance.now() });
      });

      // 부드럽게 끝나는 이징
      const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

      function draw() {
        requestAnimationFrame(draw);

        // 배경
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 기존 선들
        ctx.lineWidth = LINE_WIDTH;
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        finishedLines.forEach(p => {
          ctx.beginPath();
          ctx.moveTo(center.x, center.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        });

        // 중심점
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.beginPath();
        ctx.arc(center.x, center.y, 3, 0, Math.PI * 2);
        ctx.fill();

        // 진행 중 애니메이션
        const now = performance.now();
        for (let i = anims.length - 1; i >= 0; i--) {
          const a = anims[i];
          let t = (now - a.start) / DURATION;
          if (t >= 1) {
            finishedLines.push({ x: a.x, y: a.y });
            anims.splice(i, 1);
            t = 1;
          }
          const s = easeOutCubic(Math.max(0, Math.min(1, t)));
          const ex = center.x + (a.x - center.x) * s;
          const ey = center.y + (a.y - center.y) * s;

          ctx.beginPath();
          ctx.moveTo(center.x, center.y);
          ctx.lineTo(ex, ey);
          ctx.stroke();
        }
      }
      draw();

      // C 키로 모두 지우기(선택)
      window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'c') finishedLines.length = 0;
      });
    })();
  </script>
</body>
</html>
